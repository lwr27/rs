<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>OSRS XP Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --rs-bg: #14100b;
    --rs-panel: #4c4234;
    --rs-panel-light: #6b5d47;
    --rs-panel-dark: #2e2820;
    --rs-cell: #3e362a;
    --rs-cell-light: #574c3a;
    --rs-cell-dark: #241f18;
    --rs-border-light: #8a7859;
    --rs-border-dark: #100d09;
    --rs-gold: #ffd700;
    --rs-gold-dim: #ff981f;
    --rs-text: #ffffff;
    --rs-text-dim: #c8b98f;
    --rs-green: #00ff00;
    --rs-red: #ff0000;
    --rs-scroll: #95784a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Trebuchet MS', 'Segoe UI', Verdana, sans-serif;
    background: var(--rs-bg);
    background-image:
      repeating-linear-gradient(45deg, rgba(0,0,0,0.15) 0, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px);
    color: var(--rs-text-dim);
    min-height: 100vh;
    padding: 12px;
  }
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
    padding: 6px 10px;
    background: var(--rs-panel);
    border-top: 2px solid var(--rs-border-light);
    border-left: 2px solid var(--rs-border-light);
    border-right: 2px solid var(--rs-border-dark);
    border-bottom: 2px solid var(--rs-border-dark);
  }
  header h1 { color: var(--rs-gold); font-size: 1.3rem; text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000; letter-spacing: 0.5px; }
  header .updated { color: var(--rs-text-dim); font-size: 0.8rem; }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 1900px;
    margin: 0 auto;
  }

  .player-col {
    background: #5a4a32;
    border: 4px solid #3a2f1f;
    border-radius: 6px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    box-shadow: inset 0 0 0 1px #7a6642;
  }
  .player-name {
    text-align: center;
    color: var(--rs-gold);
    font-size: 1.1rem;
    font-weight: bold;
    text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
    padding: 4px;
  }

  .skill-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; position: relative; }
  .skill-cell {
    position: relative;
    background:
      radial-gradient(circle at 30% 25%, #8a8378 0%, #6b6459 40%, #565049 100%);
    margin: 2px;
    clip-path: polygon(15% 0%, 85% 0%, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0% 85%, 0% 15%);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 6px;
    min-height: 62px;
    cursor: default;
    box-shadow: inset 0 0 0 2px #3a352e, inset 0 0 8px rgba(0,0,0,0.5);
  }
  .skill-cell:hover { filter: brightness(1.15); }
  .skill-icon { width: 26px; height: 26px; flex-shrink: 0; filter: drop-shadow(1px 1px 0 rgba(0,0,0,0.9)); }
  .skill-cell .stext { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.15; }
  .skill-cell .slevel { font-size: 1rem; font-weight: bold; color: var(--rs-gold); text-shadow: 1px 1px 0 #000; }
  .skill-cell .sfrac { font-size: 0.7rem; color: var(--rs-gold); text-shadow: 1px 1px 0 #000; opacity: 0.85; }
  .skill-cell.gained { box-shadow: inset 0 0 0 2px var(--rs-green), inset 0 0 8px rgba(0,0,0,0.5); }
  .skill-cell .gain-badge {
    position: absolute; top: -4px; right: -2px;
    background: #14110c; color: var(--rs-green);
    font-size: 0.55rem; font-weight: bold;
    padding: 1px 4px; border: 1px solid var(--rs-green); border-radius: 2px;
    z-index: 3;
  }

  .total-row {
    grid-column: span 3;
    background: #000;
    margin: 4px 2px 2px;
    border: 2px solid #3a352e;
    border-radius: 4px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 10px; font-size: 0.85rem; gap: 2px;
  }
  .total-row .tlabel { color: var(--rs-gold); font-size: 0.75rem; }
  .total-row .tv { color: var(--rs-gold); font-weight: bold; font-size: 1.1rem; text-shadow: 1px 1px 0 #000; }
  .total-row .tg { color: var(--rs-green); font-weight: bold; font-size: 0.75rem; }

  .section-label {
    color: var(--rs-gold-dim); font-size: 0.72rem; text-transform: uppercase;
    letter-spacing: 0.5px; padding: 3px 6px;
    background: var(--rs-cell-dark);
    border-top: 1px solid var(--rs-border-dark);
    border-left: 1px solid var(--rs-border-dark);
  }

  .feed { max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; padding-right: 2px; }
  .feed::-webkit-scrollbar { width: 8px; }
  .feed::-webkit-scrollbar-thumb { background: var(--rs-scroll); border-radius: 2px; }
  .feed::-webkit-scrollbar-track { background: var(--rs-cell); }
  .feed-item {
    background: var(--rs-cell); border: 1px solid #000; padding: 4px 8px;
    font-size: 0.72rem; display: flex; justify-content: space-between; gap: 8px;
  }
  .feed-item .fs { color: var(--rs-text-dim); }
  .feed-item .fx { color: var(--rs-green); font-weight: bold; white-space: nowrap; }
  .feed-item .ft { color: #8a7d63; font-size: 0.65rem; white-space: nowrap; }
  .feed-empty { color: #8a7d63; font-size: 0.72rem; text-align: center; padding: 12px; }

  .graph-wrap { background: var(--rs-cell); border: 1px solid #000; padding: 6px; height: 140px; position: relative; }

  .tooltip {
    display: none; position: absolute; z-index: 20;
    bottom: 100%; left: 50%; transform: translateX(-50%); margin-bottom: 6px;
    background: #0e0c08; border: 1px solid var(--rs-border-light); color: var(--rs-text);
    font-size: 0.68rem; padding: 6px 8px; white-space: nowrap; border-radius: 2px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.6); min-width: 130px;
  }
  .tooltip .tr { display: flex; justify-content: space-between; gap: 14px; }
  .tooltip .tr + .tr { margin-top: 2px; }
  .tooltip .th { color: var(--rs-gold); font-weight: bold; border-bottom: 1px solid var(--rs-border-light); margin-bottom: 3px; padding-bottom: 2px; }
  .tooltip .hist { color: #8a7d63; font-size: 0.62rem; margin-top: 4px; border-top: 1px solid var(--rs-border-light); padding-top: 3px; white-space: normal; }
  .skill-cell:hover .tooltip { display: block; }

  .error { color: var(--rs-red); text-align: center; padding: 1rem; font-size: 0.85rem; }

  @media (max-width: 1100px) {
    .board { grid-template-columns: 1fr; max-width: 600px; }
  }
</style>
</head>
<body>
  <header>
    <h1>OSRS XP tracker</h1>
    <span class="updated" id="updated">Loading...</span>
  </header>

  <div class="board" id="board"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script>
    const SKILL_ORDER = [
      "Attack", "Hitpoints", "Mining",
      "Strength", "Agility", "Smithing",
      "Defence", "Herblore", "Fishing",
      "Ranged", "Thieving", "Cooking",
      "Prayer", "Crafting", "Firemaking",
      "Magic", "Fletching", "Woodcutting",
      "Runecrafting", "Slayer", "Farming",
      "Construction", "Hunter"
    ];
    // Original simple icon shapes (not game assets) themed per skill, colored by category.
    const ICONS = {
      Attack: ['#c9302c','M4 20 L18 6 M14 4 L20 4 L20 10 M2 22 L4 20'],
      Strength: ['#c9302c','M6 4 L6 12 A6 6 0 0 0 18 12 L18 4 M4 4 L8 4 M16 4 L20 4'],
      Defence: ['#4a6fa5','M12 3 L20 6 L20 12 A8 9 0 0 1 12 21 A8 9 0 0 1 4 12 L4 6 Z'],
      Hitpoints: ['#c9302c','M12 20 C6 15 3 11 3 8 A4 4 0 0 1 12 6 A4 4 0 0 1 21 8 C21 11 18 15 12 20 Z'],
      Ranged: ['#4a7c3a','M4 20 L20 4 M14 4 L20 4 L20 10 M3 13 A9 9 0 0 1 11 4'],
      Prayer: ['#d4af37','M12 3 L12 21 M6 8 L18 8 A6 5 0 0 1 6 8 Z'],
      Magic: ['#4a6fa5','M12 3 L14 9 L20 9 L15 13 L17 20 L12 16 L7 20 L9 13 L4 9 L10 9 Z'],
      Runecrafting: ['#8a5fb0','M12 3 L21 12 L12 21 L3 12 Z M12 8 L16 12 L12 16 L8 12 Z'],
      Construction: ['#7a5c3a','M4 20 L4 10 L12 4 L20 10 L20 20 Z M9 20 L9 14 L15 14 L15 20'],
      Agility: ['#4a7c3a','M6 20 L10 12 L8 8 L13 4 L14 9 L18 9 L14 13 L16 20 L11 15 Z'],
      Herblore: ['#4a7c3a','M12 21 C7 21 5 17 5 13 A7 7 0 0 1 12 4 A7 7 0 0 1 19 13 C19 17 17 21 12 21 Z M12 4 L12 12'],
      Thieving: ['#5a5a5a','M6 8 L18 8 L18 20 L6 20 Z M9 8 A3 3 0 0 1 15 8'],
      Crafting: ['#7a5c3a','M4 16 L10 4 L14 4 L20 16 L16 20 L8 20 Z'],
      Fletching: ['#7a5c3a','M3 21 L14 10 M12 4 L20 4 L20 12 M14 10 A2 2 0 1 1 10 14'],
      Slayer: ['#c9302c','M4 4 L20 20 M20 4 L4 20'],
      Mining: ['#5a5a5a','M4 20 L14 10 M10 4 L20 8 L16 12 L12 8 Z'],
      Smithing: ['#5a5a5a','M4 20 L11 13 M8 6 L18 6 L18 10 L14 10 A4 4 0 1 0 8 6 Z'],
      Fishing: ['#4a6fa5','M3 12 C7 6 17 6 21 12 C17 18 7 18 3 12 Z M17 12 L20 9 M17 12 L20 15'],
      Cooking: ['#c9302c','M4 12 A8 6 0 0 0 20 12 Z M7 12 L7 5 M12 12 L12 4 M17 12 L17 5'],
      Firemaking: ['#e8871e','M12 21 C7 21 6 17 6 14 C6 10 9 9 9 6 C11 8 14 9 14 12 C15 10 16 9 16 8 C18 11 18 13 18 14 C18 17 17 21 12 21 Z'],
      Woodcutting: ['#4a7c3a','M4 4 L14 14 M13 3 L20 10 L15 15 L8 8 Z M4 20 L9 15'],
      Farming: ['#4a7c3a','M12 21 L12 10 M12 10 C8 10 6 7 6 4 C10 4 12 7 12 10 C12 7 14 4 18 4 C18 7 16 10 12 10 Z'],
      Hunter: ['#7a5c3a','M4 4 L20 20 M4 20 L20 4 M12 2 L12 6 M12 18 L12 22 M2 12 L6 12 M18 12 L22 12']
    };
    function skillIcon(skill) {
      const [color, path] = ICONS[skill] || ['#8a7859', 'M6 6 L18 18 M6 18 L18 6'];
      return '<svg class="skill-icon" viewBox="0 0 24 24" fill="none" stroke="' + color + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="' + path + '"/></svg>';
    }
    const WINDOW_MS = 7 * 24 * 60 * 60 * 1000;
    const fmt = n => n.toLocaleString();
    function timeAgo(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const m = Math.round(diff / 60000);
      if (m < 60) return m + "m ago";
      const h = Math.round(m / 60);
      if (h < 24) return h + "h ago";
      return Math.round(h / 24) + "d ago";
    }

    let charts = [];

    async function loadHistory(username) {
      const safe = username.toLowerCase().replace(/[^a-z0-9_-]/g, "");
      try {
        const res = await fetch("data/snapshots/" + safe + ".json");
        if (!res.ok) return null;
        return await res.json();
      } catch { return null; }
    }

    function buildTooltip(skill, data, gain, history) {
      const rankText = data.rank > 0 ? fmt(data.rank) : "Unranked";
      let html = '<div class="th">' + skill + '</div>' +
        '<div class="tr"><span>Level</span><span>' + data.level + '</span></div>' +
        '<div class="tr"><span>XP</span><span>' + fmt(data.xp) + '</span></div>' +
        '<div class="tr"><span>Rank</span><span>' + rankText + '</span></div>';
      if (gain > 0) html += '<div class="tr"><span>This run</span><span style="color:#00ff00">+' + fmt(gain) + '</span></div>';
      if (history && history.length) {
        const recent = history.filter(h => h.gains && h.gains[skill] > 0).slice(-3).reverse();
        if (recent.length) {
          html += '<div class="hist">Recent: ' +
            recent.map(h => '+' + fmt(h.gains[skill]) + ' (' + timeAgo(h.timestamp) + ')').join(", ") + '</div>';
        }
      }
      return html;
    }

    function renderColumn(player, history) {
      const col = document.createElement("div");
      col.className = "player-col";

      const name = document.createElement("div");
      name.className = "player-name";
      name.textContent = player.username;
      col.appendChild(name);

      if (player.error) {
        const err = document.createElement("div");
        err.className = "error";
        err.textContent = player.error;
        col.appendChild(err);
        return col;
      }

      const grid = document.createElement("div");
      grid.className = "skill-grid";
      SKILL_ORDER.forEach(skill => {
        const data = player.stats[skill];
        const gain = (player.gains && player.gains[skill]) || 0;
        const cell = document.createElement("div");
        cell.className = "skill-cell" + (gain > 0 ? " gained" : "");
        cell.innerHTML =
          skillIcon(skill) +
          '<div class="stext"><span class="slevel">' + data.level + '</span><span class="sfrac">/ ' + data.level + '</span></div>' +
          (gain > 0 ? '<span class="gain-badge">+' + fmt(gain) + '</span>' : "") +
          '<div class="tooltip">' + buildTooltip(skill, data, gain, history && history.history) + '</div>';
        grid.appendChild(cell);
      });
      const totalRow = document.createElement("div");
      totalRow.className = "total-row";
      totalRow.innerHTML =
        '<span class="tlabel">Total level:</span>' +
        '<span class="tv">' + player.totalLevel + '</span>' +
        (player.totalGain > 0 ? '<span class="tg">+' + fmt(player.totalGain) + ' xp</span>' : '');
      grid.appendChild(totalRow);
      col.appendChild(grid);

      const feedLabel = document.createElement("div");
      feedLabel.className = "section-label";
      feedLabel.textContent = "Recent gains";
      col.appendChild(feedLabel);

      const feed = document.createElement("div");
      feed.className = "feed";
      const events = [];
      if (history && history.history) {
        const cutoff = Date.now() - WINDOW_MS;
        history.history.forEach(entry => {
          if (new Date(entry.timestamp).getTime() < cutoff) return;
          Object.entries(entry.gains || {}).forEach(([skill, xp]) => {
            if (skill !== "Overall" && xp > 0) events.push({ skill, xp, timestamp: entry.timestamp });
          });
        });
      }
      events.reverse();
      if (events.length) {
        events.slice(0, 40).forEach(ev => {
          const item = document.createElement("div");
          item.className = "feed-item";
          item.innerHTML =
            '<span class="fs">' + ev.skill + '</span>' +
            '<span class="fx">+' + fmt(ev.xp) + '</span>' +
            '<span class="ft">' + timeAgo(ev.timestamp) + '</span>';
          feed.appendChild(item);
        });
      } else {
        feed.innerHTML = '<div class="feed-empty">No gains recorded yet</div>';
      }
      col.appendChild(feed);

      const graphLabel = document.createElement("div");
      graphLabel.className = "section-label";
      graphLabel.textContent = "Total xp/hr (7 days)";
      col.appendChild(graphLabel);

      const graphWrap = document.createElement("div");
      graphWrap.className = "graph-wrap";
      const canvas = document.createElement("canvas");
      graphWrap.appendChild(canvas);
      col.appendChild(graphWrap);

      setTimeout(() => renderChart(canvas, history), 0);

      return col;
    }

    function renderChart(canvas, history) {
      if (!history || !history.history || history.history.length < 2) return;
      const cutoff = Date.now() - WINDOW_MS;
      const points = history.history
        .filter(e => new Date(e.timestamp).getTime() >= cutoff)
        .map(e => ({ t: new Date(e.timestamp), gain: e.totalGain || 0 }));
      if (points.length < 2) return;

      const labels = points.map(p => p.t.toLocaleString([], { weekday: "short", hour: "2-digit" }));
      const data = points.map(p => p.gain);

      charts.push(new Chart(canvas, {
        type: "line",
        data: {
          labels: labels,
          datasets: [{
            data: data,
            borderColor: "#ffff00",
            backgroundColor: "rgba(255,255,0,0.1)",
            borderWidth: 1.5,
            pointRadius: 0,
            tension: 0.3,
            fill: true
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: {
            callbacks: { label: ctx => "+" + fmt(ctx.parsed.y) + " xp" }
          }},
          scales: {
            x: { ticks: { color: "#8a7d63", font: { size: 8 }, maxTicksLimit: 6 }, grid: { color: "rgba(93,81,64,0.3)" } },
            y: { ticks: { color: "#8a7d63", font: { size: 8 }, callback: v => v >= 1000 ? (v/1000)+"k" : v }, grid: { color: "rgba(93,81,64,0.3)" }, beginAtZero: true }
          }
        }
      }));
    }

    async function init() {
      let data;
      try {
        const res = await fetch("data/latest.json");
        data = await res.json();
      } catch (err) {
        document.getElementById("updated").textContent = "Failed to load data.";
        console.error(err);
        return;
      }

      document.getElementById("updated").textContent =
        "Updated " + new Date(data.updated).toLocaleString();

      const board = document.getElementById("board");
      const histories = await Promise.all(data.players.map(p => loadHistory(p.username)));

      data.players.forEach((player, i) => {
        board.appendChild(renderColumn(player, histories[i]));
      });
    }

    init();
  </script>
</body>
</html>
