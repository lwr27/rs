name: Track XP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run tracker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node scripts/track.js

      - name: Copy data into docs
        run: |
          mkdir -p docs/data/snapshots
          cp data/latest.json docs/data/latest.json
          cp -r data/snapshots/. docs/data/snapshots/

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/data/
          git diff --staged --quiet || git commit -m "Update XP snapshots [skip ci]"
          git push
